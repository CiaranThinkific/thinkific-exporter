<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Thinkific Bulk Group Create</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --bg:#2b1633; --card:#2a1732; --ink:#f7f2ec; --muted:#d6c8bf; --accent:#f2c234; --accent2:#f4d45e; --border:#3a2241 }
    body { margin:0; padding:24px; background:
      radial-gradient(1100px 600px at 10% 20%, rgba(255,255,255,.08), transparent 60%),
      radial-gradient(900px 500px at 90% 30%, rgba(244,212,94,.12), transparent 55%),
      linear-gradient(180deg, #2b1633 0%, #24112c 100%);
      color:var(--ink); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    .wrap { max-width:1280px; margin:0 auto; width:100% }
    .card { background:linear-gradient(180deg, #2b1633, #24112c); border:1px solid var(--border); border-radius:20px; padding:24px; box-shadow:0 18px 44px rgba(0,0,0,.45); overflow:hidden }
    h1 { margin:.2em 0 .35em; font-size:2.1rem; font-family: Georgia, "Times New Roman", Times, serif; letter-spacing:.2px }
    .muted { color:var(--muted); font-size:.95rem }
    .brand { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px }
    .brand-name { font-weight:700; font-size:1.05rem; color:var(--ink) }
    .brand-tag { font-size:.8rem; color:var(--muted) }
    .brand-link { color:var(--ink); text-decoration:none; font-size:.85rem; border:1px solid rgba(247,242,236,.5); padding:6px 12px; border-radius:999px }
    .brand-link:hover { background:rgba(247,242,236,.1) }
    label { display:block; margin-top:12px; font-size:.95rem; color:#cbd5e1 }
    .token-save { display:flex; gap:8px; align-items:center; margin-top:6px }
    .token-save input { flex:1 }
    .token-save button { flex:0 0 auto; padding:10px 14px; font-size:.95rem }
    input, select { width:100%; padding:10px 12px; border-radius:12px; border:1px solid #263249; background:#0a1220; color:var(--ink) }
    .btns { display:flex; gap:12px; margin-top:16px }
    button { flex:1; padding:12px 16px; border-radius:999px; border:0; background:var(--accent); color:#2b1633; font-weight:700; font-size:1rem; cursor:pointer }
    button.secondary { background:transparent; border:1px solid rgba(247,242,236,.6); color:var(--ink) }
    button.danger { background:#ef4444; color:#fff; border:1px solid rgba(239,68,68,.6) }
    button:disabled { opacity:.6; cursor:not-allowed }
    .progress { position:relative; margin-top:14px; height:12px; background:#0a1220; border:1px solid #263249; border-radius:999px; overflow:hidden }
    .bar { position:absolute; inset:0; width:0%; background:linear-gradient(90deg, var(--accent), var(--accent2)); transition:width .2s linear }
    .bar.indeterminate::before { content:""; position:absolute; left:-40%; top:0; width:40%; height:100%; background:linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent); animation: slide 1.1s infinite }
    @keyframes slide { 0% { left:-40% } 100% { left:100% } }
    .status { margin-top:8px; font-size:.9rem; color:#cbd5e1 }
    .log { margin-top:12px; background:#0a1220; border:1px solid #263249; border-radius:12px; padding:10px; font-size:.85rem; max-height:200px; overflow:auto; white-space:pre-wrap }
    .preview { margin-top:12px; border:1px solid #263249; border-radius:12px; background:#0a1220; overflow:hidden }
    .preview-meta { padding:8px 12px; border-bottom:1px solid #1f2a3e; font-size:.85rem; color:#cbd5e1 }
    .preview-scroll { max-height:220px; overflow:auto }
    .preview-table { width:max-content; min-width:100%; border-collapse:collapse; font-size:.85rem }
    .preview-table th, .preview-table td { padding:8px 10px; border-bottom:1px solid #1f2a3e; white-space:nowrap; vertical-align:top }
    .preview-table th { background:#0b1324; position:sticky; top:0; text-align:left }
    .preview-highlight { background:rgba(242,194,52,.12) }
    .table-resize { margin-top:16px; border:1px solid #263249; border-radius:14px; background:#0a1220; overflow:hidden; min-height:240px; width:100% }
    .table-toolbar { display:flex; gap:12px; align-items:center; padding:10px 12px; border-bottom:1px solid #263249; background:rgba(15,23,42,.6) }
    .table-toolbar .muted { font-size:.85rem }
    .table-scroll { min-height:200px; max-height:360px; overflow:auto }
    table { width:max-content; min-width:100%; border-collapse:collapse; font-size:.9rem }
    th, td { padding:8px 10px; border-bottom:1px solid #1f2a3e; vertical-align:top; white-space:nowrap }
    th { background:#0b1324; position:sticky; top:0; z-index:1; text-align:left }
    .empty { padding:14px; color:var(--muted); font-size:.9rem }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div>
          <div class="brand-name">Thinkific</div>
          <div class="brand-tag">Bulk Group Create</div>
        </div>
        <a class="brand-link" href="https://www.thinkific.com/" target="_blank" rel="noreferrer">thinkific.com</a>
      </div>
      <h1>Bulk Group Create</h1>
      <div class="muted">Upload a CSV, map one Group Name column, then create groups in Thinkific.</div>

      <label>Bearer Token (saved on this device)
        <div class="token-save">
          <input id="token" value="add access token here!">
          <button id="save-token" type="button" class="secondary">Save API Key</button>
        </div>
      </label>

      <label>CSV File
        <input id="csv-file" type="file" accept=".csv,text/csv">
      </label>

      <label>Group Name Column
        <select id="group-name-col" disabled></select>
      </label>

      <div class="preview">
        <div id="preview-meta" class="preview-meta">No CSV loaded.</div>
        <div class="preview-scroll">
          <table id="preview-table" class="preview-table"></table>
        </div>
      </div>

      <div class="btns">
        <button id="start">Create Groups</button>
        <button id="stop" class="danger" disabled>Stop Create</button>
      </div>

      <div class="progress"><div id="bar" class="bar indeterminate"></div></div>
      <div id="status" class="status">Idle</div>
      <div id="log" class="log"></div>

      <div class="table-resize">
        <div class="table-toolbar">
          <div class="muted" id="table-meta">No rows loaded.</div>
        </div>
        <div class="table-scroll">
          <table id="results-table" aria-live="polite"></table>
        </div>
        <div id="table-empty" class="empty">Load and map a CSV to see rows.</div>
      </div>
    </div>
  </div>

<script>
const $ = s => document.querySelector(s);
const log = (m) => ( $("#log").textContent += ( $("#log").textContent ? "\n" : "" ) + m, $("#log").scrollTop = $("#log").scrollHeight );
const setStatus = (t) => $("#status").textContent = t;
const setBar = (pct) => { const b = $("#bar"); b.classList.remove("indeterminate"); b.style.width = Math.max(0,Math.min(100,pct)) + "%"; };
const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

const API_ENDPOINT = "https://api.thinkific.com/api/public/v1/groups";
const TOKEN_KEY = "thinkific-bulk-group-create-token";

let csvCache = null;
let tableRows = [];
let stopRequested = false;
let isImporting = false;

function csvParse(text) {
  const rows = [];
  let cur = "";
  let row = [];
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];
    if (inQuotes) {
      if (ch === '"' && next === '"') { cur += '"'; i++; continue; }
      if (ch === '"') { inQuotes = false; continue; }
      cur += ch;
      continue;
    }
    if (ch === '"') { inQuotes = true; continue; }
    if (ch === ',') { row.push(cur); cur = ""; continue; }
    if (ch === '\n') { row.push(cur); rows.push(row); row = []; cur = ""; continue; }
    if (ch === '\r') { continue; }
    cur += ch;
  }
  row.push(cur);
  rows.push(row);
  return rows;
}

function normalizeHeader(value) {
  return String(value || "")
    .replace(/^\uFEFF/, "")
    .trim()
    .toLowerCase()
    .replace(/[\s_-]+/g, "");
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ""));
    reader.onerror = () => reject(reader.error || new Error("Failed to read file"));
    reader.readAsText(file);
  });
}

function setColumnOptions(headers) {
  const groupName = $("#group-name-col");
  groupName.innerHTML = "";

  const defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.textContent = "Select column";
  defaultOption.disabled = true;
  defaultOption.selected = true;
  groupName.appendChild(defaultOption);

  headers.forEach((header, idx) => {
    const label = String(header || "").trim() || ("Column " + (idx + 1));
    const opt = document.createElement("option");
    opt.value = String(idx);
    opt.textContent = label;
    groupName.appendChild(opt);
  });

  const normalized = headers.map(normalizeHeader);
  const detected = normalized.findIndex(h => h === "groupname" || h === "name" || h === "group");
  if (detected >= 0) groupName.value = String(detected);

  groupName.disabled = false;
}

function getMapping() {
  const raw = $("#group-name-col").value;
  const index = raw === "" ? undefined : Number(raw);
  return { nameIndex: Number.isFinite(index) ? index : undefined };
}

function renderPreview() {
  const table = $("#preview-table");
  table.innerHTML = "";
  if (!csvCache || !csvCache.headers.length) {
    $("#preview-meta").textContent = "No CSV loaded.";
    return;
  }

  const { headers, rows } = csvCache;
  const mapping = getMapping();
  const thead = document.createElement("thead");
  const htr = document.createElement("tr");
  headers.forEach((header, idx) => {
    const th = document.createElement("th");
    th.textContent = String(header || "").trim() || ("Column " + (idx + 1));
    if (idx === mapping.nameIndex) th.className = "preview-highlight";
    htr.appendChild(th);
  });
  thead.appendChild(htr);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  rows.slice(0, 12).forEach(row => {
    const tr = document.createElement("tr");
    headers.forEach((_, idx) => {
      const td = document.createElement("td");
      td.textContent = String(row[idx] || "");
      if (idx === mapping.nameIndex) td.className = "preview-highlight";
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  $("#preview-meta").textContent = rows.length + " data rows loaded.";
}

function mapRowsFromCsv() {
  if (!csvCache) throw new Error("Load a CSV file first.");
  const { rows } = csvCache;
  const mapping = getMapping();
  if (mapping.nameIndex === undefined) {
    throw new Error("Select the Group Name column.");
  }

  const mapped = [];
  for (const row of rows) {
    const groupName = String(row[mapping.nameIndex] || "").trim();
    if (!groupName) continue;
    mapped.push({
      group_name: groupName,
      group_id: "",
      status: "Pending"
    });
  }
  if (!mapped.length) {
    throw new Error("No usable rows found after applying the selected column.");
  }
  return mapped;
}

function renderResultsTable() {
  const table = $("#results-table");
  const empty = $("#table-empty");
  const meta = $("#table-meta");
  table.innerHTML = "";

  if (!tableRows.length) {
    empty.style.display = "block";
    meta.textContent = "No rows loaded.";
    return;
  }

  empty.style.display = "none";
  meta.textContent = tableRows.length + " rows";

  const columns = [
    ["Group Name", r => r.group_name],
    ["Group ID", r => r.group_id || ""],
    ["Status", r => r.status]
  ];

  const thead = document.createElement("thead");
  const htr = document.createElement("tr");
  columns.forEach(col => {
    const th = document.createElement("th");
    th.textContent = col[0];
    htr.appendChild(th);
  });
  thead.appendChild(htr);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  tableRows.forEach(row => {
    const tr = document.createElement("tr");
    columns.forEach(col => {
      const td = document.createElement("td");
      td.textContent = String(col[1](row) || "");
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
}

function extractGroupFromResponse(json) {
  if (!json) return null;
  if (json.group && typeof json.group === "object") return json.group;
  if (json.data && typeof json.data.group === "object") return json.data.group;
  return json;
}

async function requestPostJson(url, token, body, attempt = 1) {
  const resp = await fetch(url, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify(body)
  });

  if (resp.status === 429 && attempt <= 3) {
    const retryAfter = Number(resp.headers.get("Retry-After") || "0");
    const waitMs = Math.max(1000, Math.min(60000, (retryAfter || 2) * 1000));
    await sleep(waitMs);
    return requestPostJson(url, token, body, attempt + 1);
  }

  let json = null;
  try { json = await resp.json(); } catch {}

  if (!resp.ok) {
    const err = new Error("HTTP " + resp.status + " - " + resp.statusText);
    err.status = resp.status;
    err.body = json;
    throw err;
  }

  return json;
}

async function createGroups() {
  const token = $("#token").value.trim();
  if (!token) { alert("Bearer token is required."); return; }
  if (!csvCache) { alert("Load a CSV file first."); return; }

  let rows;
  try {
    rows = mapRowsFromCsv();
  } catch (err) {
    alert(err.message);
    return;
  }

  tableRows = rows;
  renderResultsTable();

  isImporting = true;
  stopRequested = false;
  $("#start").disabled = true;
  $("#stop").disabled = false;
  $("#log").textContent = "";
  setStatus("Creating " + rows.length + " groups…");
  $("#bar").classList.add("indeterminate");
  setBar(0);

  let success = 0;
  let failed = 0;

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    if (stopRequested) {
      row.status = "Stopped";
      for (let j = i + 1; j < rows.length; j++) rows[j].status = "Stopped";
      renderResultsTable();
      break;
    }

    setStatus("Creating group " + (i + 1) + " of " + rows.length + "…");
    setBar(Math.round((i / rows.length) * 100));

    if (!row.group_name) {
      row.status = "Skipped: missing group name";
      failed++;
      log("Row " + (i + 1) + ": skipped (missing group name).");
      renderResultsTable();
      continue;
    }

    try {
      const result = await requestPostJson(API_ENDPOINT, token, { name: row.group_name });
      const group = extractGroupFromResponse(result);
      const id = group && (group.id || group.group_id || group.groupId);
      row.group_id = id ? String(id) : "";
      row.status = "Created";
      success++;
      log("Row " + (i + 1) + ": created group '" + row.group_name + "'.");
    } catch (err) {
      row.status = "Error";
      failed++;
      const details = err && err.body ? " | " + JSON.stringify(err.body) : "";
      log("Row " + (i + 1) + ": error for '" + row.group_name + "' - " + err.message + details);
    }

    renderResultsTable();
    await sleep(700);
  }

  setBar(100);
  if (stopRequested) {
    setStatus("Stopped by user. Created: " + success + ", Failed: " + failed + ".");
    log("Create stopped. Created: " + success + ", Failed: " + failed + ".");
  } else {
    setStatus("Done ✔ " + success + " created, " + failed + " failed.");
    log("Create complete. Created: " + success + ", Failed: " + failed + ".");
  }

  isImporting = false;
  $("#start").disabled = false;
  $("#stop").disabled = true;
}

const saved = localStorage.getItem(TOKEN_KEY);
if (saved) {
  $("#token").value = saved;
  log("Loaded saved API key from this device.");
}

$("#save-token").addEventListener("click", () => {
  const token = $("#token").value.trim();
  if (!token) { alert("Enter a token before saving."); return; }
  localStorage.setItem(TOKEN_KEY, token);
  log("API key saved to this device.");
});

$("#csv-file").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await readFileAsText(file);
    const parsed = csvParse(text).filter(r => r.some(cell => String(cell || "").trim() !== ""));
    if (!parsed.length) throw new Error("CSV appears empty.");

    const headers = parsed[0];
    const rows = parsed.slice(1);
    csvCache = { headers, rows };

    setColumnOptions(headers);
    renderPreview();

    tableRows = [];
    renderResultsTable();
    setStatus("CSV loaded. Map column, then click Create Groups.");
    log("CSV parsed: " + rows.length + " data rows.");
  } catch (err) {
    setStatus("Error ⚠ " + err.message);
    log("Error parsing CSV: " + err.message);
    csvCache = null;
    $("#group-name-col").disabled = true;
    $("#group-name-col").innerHTML = "";
    $("#preview-meta").textContent = "No CSV loaded.";
    $("#preview-table").innerHTML = "";
  }
});

$("#group-name-col").addEventListener("change", renderPreview);
$("#start").addEventListener("click", createGroups);
$("#stop").addEventListener("click", () => {
  if (!isImporting || stopRequested) return;
  stopRequested = true;
  $("#stop").disabled = true;
  setStatus("Stopping after current request…");
  log("Stop requested. Finishing current row then stopping.");
});

renderResultsTable();
</script>
</body>
</html>
