<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Thinkific Vimeo Lesson Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --bg:#2b1633; --card:#2a1732; --ink:#f7f2ec; --muted:#d6c8bf; --accent:#f2c234; --accent2:#f4d45e; --border:#3a2241; --thinkific:#24111f }
    body { margin:0; padding:24px; background:
      radial-gradient(1100px 600px at 10% 20%, rgba(255,255,255,.08), transparent 60%),
      radial-gradient(900px 500px at 90% 30%, rgba(244,212,94,.12), transparent 55%),

    .wrap { max-width:none; margin:0 auto; width:max-content; min-width:900px }
    .card { background:linear-gradient(180deg, #2b1633, #24112c); border:1px solid var(--border); border-radius:20px; padding:24px; box-shadow:0 18px 44px rgba(0,0,0,.45) }

    .brand-tag { font-size:.8rem; color:var(--muted) }
    .brand-link { color:var(--ink); text-decoration:none; font-size:.85rem; border:1px solid rgba(247,242,236,.5); padding:6px 12px; border-radius:999px }

    .token-save button { flex:0 0 auto; padding:10px 14px; font-size:.95rem }

    button { flex:1; padding:12px 16px; border-radius:999px; border:0; background:var(--accent); color:#2b1633; font-weight:700; font-size:1rem; cursor:pointer }

    .bar { position:absolute; inset:0; width:0%; background:linear-gradient(90deg, var(--accent), var(--accent2)); transition:width .2s linear }
    .bar.indeterminate::before { content:""; position:absolute; left:-40%; top:0; width:40%; height:100%; background:linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent); animation: slide 1.1s infinite }

    .status { margin-top:8px; font-size:.9rem; color:#cbd5e1 }
    .log { margin-top:12px; background:#0a1220; border:1px solid #263249; border-radius:12px; padding:10px; font-size:.85rem; max-height:200px; overflow:auto; white-space:pre-wrap }
    .table-resize { margin-top:16px; border:1px solid #263249; border-radius:14px; background:#0a1220; overflow:hidden; min-height:240px; width:1500px; padding:0 20px 20px 0; position:relative }
    .table-resize-handle { position:absolute; right:6px; bottom:6px; width:18px; height:18px; cursor:se-resize }
    .table-resize-handle::after { content:""; position:absolute; right:2px; bottom:2px; width:12px; height:12px; border-right:2px solid rgba(203,213,225,.6); border-bottom:2px solid rgba(203,213,225,.6) }
    .table-wrap { display:flex; flex-direction:column; height:100%; overflow:hidden; margin:0 -20px -20px 0 }
    .table-toolbar { display:flex; gap:12px; align-items:center; padding:10px 12px; border-bottom:1px solid #263249; background:rgba(15,23,42,.6) }
    .table-toolbar .muted { font-size:.85rem }
    .table-toolbar button { flex:0 0 auto; padding:8px 12px; font-size:.85rem; border-radius:10px }
    table { width:100%; border-collapse:collapse; font-size:.9rem; table-layout:auto }
    th, td { padding:8px 10px; border-bottom:1px solid #1f2a3e; vertical-align:top; white-space:nowrap }
    th { background:#0b1324; position:sticky; top:0; z-index:1; text-align:left }
    th.dragging { opacity:.6 }
    th .col-label { display:flex; align-items:center; gap:8px; cursor:grab }
    th .col-label span { font-weight:600 }
    .filter-wrap { margin-top:6px; display:flex; align-items:center; gap:6px }
    details.filter { position:relative }
    details.filter summary { list-style:none; cursor:pointer; font-size:.75rem; color:#cbd5e1; border:1px solid #1f2a3e; padding:4px 8px; border-radius:8px; background:#0b1324 }
    details.filter summary::-webkit-details-marker { display:none }
    .filter-popover { position:absolute; top:28px; left:0; z-index:5; background:#0b1324; border:1px solid #1f2a3e; border-radius:10px; padding:8px; min-width:220px; max-width:320px; max-height:260px; overflow:auto; box-shadow:0 10px 24px rgba(0,0,0,.35) }
    .filter-actions { display:flex; gap:6px; margin-bottom:8px }
    .filter-actions button { flex:1; padding:6px 8px; font-size:.72rem; border-radius:8px; border:1px solid #1f2a3e; background:#0a1220; color:#cbd5e1; cursor:pointer }
    .filter-option { display:flex; align-items:center; gap:6px; font-size:.78rem; padding:2px 0 }
    .filter-option input { width:auto }
    .table-scroll { flex:1; min-height:200px; overflow:auto }
    .empty { padding:14px; color:var(--muted); font-size:.9rem }
    .vimeo-link { color:var(--accent2); text-decoration:none; display:block; margin-bottom:2px }
    .vimeo-link:hover { text-decoration:underline }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div class="brand-left">
          <div>
            <div class="brand-name">Thinkific</div>
            <div class="brand-tag">Vimeo Lesson Finder</div>
          </div>
        </div>
        <a class="brand-link" href="https://www.thinkific.com/" target="_blank" rel="noreferrer">thinkific.com</a>
      </div>
      <h1>Vimeo Lesson Finder</h1>
      <div class="muted">Scans all lessons across your courses for Vimeo embed links and exports the results to CSV. Each row is one Vimeo URL found in a lesson's HTML body.</div>

      <div class="row">
        <label>GraphQL Endpoint
          <input id="endpoint" value="https://api.thinkific.com/stable/graphql">
        </label>
        <label>Output File
          <input id="outfile" value="thinkific-vimeo-lessons.csv">
        </label>
      </div>

      <label>Bearer Token (saved on this device)
        <div class="token-save">
          <input id="token" type="password" placeholder="Paste your API token here">
          <button id="save-token" type="button" class="secondary">Save API Key</button>
        </div>
      </label>

      <div class="row">
        <label>Course ID Filter <span style="font-size:.8rem;color:var(--muted)">(optional — leave blank for all courses)</span>
          <input id="course-id" placeholder="e.g. 12345">
        </label>
        <label>Lessons With Vimeo Only
          <select id="vimeo-only">
            <option value="yes">Yes — only rows with a Vimeo link</option>
            <option value="no">No — include all lessons</option>
          </select>
        </label>
        <label>Stop after N Vimeo hits <span style="font-size:.8rem;color:var(--muted)">(0 = no limit)</span>
          <input id="max-vimeo" type="number" min="0" value="0" placeholder="0">
        </label>
      </div>

      <div class="btns">
        <button id="start">Find Vimeo Lessons</button>
        <button id="download" class="secondary" disabled>Download CSV</button>
      </div>

      <div class="progress"><div id="bar" class="bar indeterminate"></div></div>
      <div id="status" class="status">Idle</div>
      <div id="log" class="log"></div>

      <div class="table-resize" id="table-resize">
        <div class="table-wrap">
          <div class="table-toolbar">
            <div class="muted" id="table-meta">No results yet.</div>
            <div style="flex:1"></div>
            <button id="reset-columns" type="button" class="secondary" disabled>Reset Columns</button>
          </div>
          <div class="table-scroll">
            <table id="results-table" aria-live="polite"></table>
          </div>
          <div id="table-empty" class="empty">Run a scan to see results.</div>
        </div>
        <div class="table-resize-handle" id="table-resize-handle" aria-hidden="true"></div>
      </div>
    </div>
  </div>

<script>
const $ = s => document.querySelector(s);
const log = (m) => {
  const el = $("#log");
  el.textContent += (el.textContent ? "\n" : "") + m;
  el.scrollTop = el.scrollHeight;
};
const setStatus = (t) => { $("#status").textContent = t; };
const setBar = (pct) => {
  const b = $("#bar");
  b.classList.remove("indeterminate");
  b.style.width = Math.max(0, Math.min(100, pct)) + "%";
};
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

const COURSES_PAGE_SIZE = 50;

// Introspection queries — used on first run to discover real field names.
const QUERY_INTROSPECT_TYPE = (typeName) => `query Introspect_${typeName} {
  __type(name: "${typeName}") {
    fields { name type { name kind ofType { name kind } } }
  }
}`;

// Built dynamically after introspection — see buildCourseQuery().
let QUERY_COURSES = null;

// ---------------------------------------------------------------------------
// GraphQL helpers (rate-limit aware, identical pattern to source tool)
// ---------------------------------------------------------------------------

function attachRateLimit(err, payload) {
  if (payload && payload.extensions && payload.extensions.rateLimit) {
    err.rateLimit = payload.extensions.rateLimit;
  }
}

async function gql(endpoint, token, query, variables) {
  const resp = await fetch(endpoint, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify({ query, variables })
  });

  let json;
  try { json = await resp.json(); }
  catch (parseErr) {
    if (!resp.ok) {
      const err = new Error("HTTP " + resp.status + " - " + resp.statusText);
      err.status = resp.status;
      throw err;
    }
    throw new Error("Invalid JSON response.");
  }

  if (!resp.ok) {
    const err = new Error("HTTP " + resp.status + " - " + resp.statusText);
    err.status = resp.status;
    err.body = json;
    attachRateLimit(err, json);
    throw err;
  }

  if (json.errors) {
    const msg = json.errors.map(e => e.message).join("; ");
    const err = new Error("GraphQL error: " + msg);
    err.graphQLErrors = json.errors;
    const code = json.errors.find(e => e.extensions && e.extensions.code)?.extensions.code;
    if (code) err.code = code;
    attachRateLimit(err, json);
    throw err;
  }

  return json.data;
}

function isRateLimitError(err) {
  if (!err) return false;
  if (err.code === "RATE_LIMITED") return true;
  if (Array.isArray(err.graphQLErrors)) {
    return err.graphQLErrors.some(e => e.extensions && e.extensions.code === "RATE_LIMITED");
  }
  return typeof err.message === "string" && err.message.toLowerCase().includes("rate limit");
}

function getRateLimitWait(err) {
  const fallbackMs = 60 * 1000;
  const rl = err && err.rateLimit;
  if (rl && rl.resetAt) {
    const resetAtMs = new Date(rl.resetAt).getTime();
    if (Number.isFinite(resetAtMs)) {
      const diff = resetAtMs - Date.now();
      if (diff > 0) return { waitMs: Math.min(diff, 5 * 60 * 1000), resetAt: rl.resetAt };
    }
  }
  return { waitMs: fallbackMs, resetAt: rl && rl.resetAt };
}

async function gqlWithRetry(endpoint, token, query, variables) {
  while (true) {
    try {
      return await gql(endpoint, token, query, variables);
    } catch (err) {
      if (isRateLimitError(err)) {
        const { waitMs, resetAt } = getRateLimitWait(err);
        const safeMs = Math.max(1000, waitMs || 0);
        const note = resetAt ? " (reset at " + resetAt + ")" : "";
        setStatus("Rate limited. Waiting " + Math.ceil(safeMs / 1000) + "s" + note + "…");
        log("Rate limit hit. Waiting " + Math.ceil(safeMs / 1000) + "s…");
        $("#bar").classList.add("indeterminate");
        await sleep(safeMs);
        continue;
      }
      throw err;
    }
  }
}

// ---------------------------------------------------------------------------
// Vimeo link extraction
// ---------------------------------------------------------------------------

function extractVimeoLinks(html) {
  if (!html) return [];
  const found = new Set();

  // iframes with player.vimeo.com or vimeo.com in src
  const iframeRe = /<iframe[^>]+src=["']([^"']*vimeo\.com[^"']*)["'][^>]*>/gi;
  let m;
  while ((m = iframeRe.exec(html)) !== null) found.add(m[1]);

  // any src= or href= pointing to vimeo.com (catches embed divs, anchor links, etc.)
  const attrRe = /(?:src|href)=["']([^"']*vimeo\.com[^"']*)["']/gi;
  while ((m = attrRe.exec(html)) !== null) found.add(m[1]);

  return Array.from(found);
}

// ---------------------------------------------------------------------------
// CSV
// ---------------------------------------------------------------------------

function csvEscape(value) {
  if (value === null || value === undefined) return "";
  const s = String(value);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

const COLUMN_DEFS = [
  { id: "courseId",     label: "Course ID",     get: r => r.courseId },
  { id: "courseName",   label: "Course Name",   get: r => r.courseName },
  { id: "chapterId",    label: "Chapter ID",    get: r => r.chapterId },
  { id: "chapterName",  label: "Chapter Name",  get: r => r.chapterName },
  { id: "lessonId",     label: "Lesson ID",     get: r => r.lessonId },
  { id: "lessonTitle",  label: "Lesson Title",  get: r => r.lessonTitle },
  { id: "lessonType",   label: "Lesson Type",   get: r => r.lessonType },
  { id: "vimeoUrl",     label: "Vimeo URL",     get: r => r.vimeoUrl },
];

function getColumnById(id) { return COLUMN_DEFS.find(c => c.id === id); }

function toCSV(rows, order) {
  const ids = Array.isArray(order) && order.length ? order : COLUMN_DEFS.map(c => c.id);
  const cols = ids.map(id => getColumnById(id)).filter(Boolean);
  const lines = [cols.map(c => c.id).map(csvEscape).join(",")];
  for (const r of rows) {
    lines.push(cols.map(c => c.get(r)).map(csvEscape).join(","));
  }
  return lines.join("\n");
}

// ---------------------------------------------------------------------------
// Table rendering
// ---------------------------------------------------------------------------

let tableRows = [];
const COLUMN_ORDER_KEY = "thinkific-vimeo-finder-column-order";
let columnOrder = COLUMN_DEFS.map(c => c.id);
const filters = {};

function loadColumnOrder() {
  const saved = localStorage.getItem(COLUMN_ORDER_KEY);
  if (!saved) return;
  try {
    const parsed = JSON.parse(saved);
    const ids = new Set(COLUMN_DEFS.map(c => c.id));
    if (!Array.isArray(parsed)) return;
    const next = parsed.filter(id => ids.has(id));
    for (const id of ids) { if (!next.includes(id)) next.push(id); }
    columnOrder = next;
  } catch { /* ignore */ }
}

function saveColumnOrder() { localStorage.setItem(COLUMN_ORDER_KEY, JSON.stringify(columnOrder)); }
function resetColumns() { columnOrder = COLUMN_DEFS.map(c => c.id); saveColumnOrder(); renderTable(); }

function applyFilters(rows) {
  const active = Object.entries(filters).filter(([, v]) => v instanceof Set);
  if (!active.length) return rows;
  return rows.filter(row =>
    active.every(([colId, set]) => {
      const col = getColumnById(colId);
      return col && set.size > 0 && set.has(String(col.get(row) || ""));
    })
  );
}

function getColumnValues(colId) {
  const col = getColumnById(colId);
  if (!col) return [];
  const set = new Set();
  for (const row of tableRows) set.add(String(col.get(row) || ""));
  return Array.from(set).sort((a, b) => a.localeCompare(b));
}

function computeColumnWidths(rows) {
  const widths = {};
  const sample = Math.min(rows.length, 200);
  for (const colId of columnOrder) {
    const col = getColumnById(colId);
    if (!col) continue;
    let max = (col.label || "").length;
    if (colId === "vimeoUrl") { widths[colId] = "40ch"; continue; }
    for (let i = 0; i < sample; i++) {
      const len = String(col.get(rows[i]) || "").length;
      if (len > max) max = len;
    }
    widths[colId] = Math.max(8, Math.min(48, max)) + "ch";
  }
  return widths;
}

function renderTable() {
  const table = $("#results-table");
  const empty = $("#table-empty");
  const meta = $("#table-meta");
  table.innerHTML = "";

  if (!tableRows.length) {
    empty.style.display = "block";
    meta.textContent = "No results yet.";
    return;
  }

  const filtered = applyFilters(tableRows);
  meta.textContent = filtered.length + " of " + tableRows.length + " rows";
  empty.style.display = filtered.length ? "none" : "block";
  empty.textContent = filtered.length ? "" : "No results match your filters.";

  const colgroup = document.createElement("colgroup");
  const widths = computeColumnWidths(filtered);
  for (const colId of columnOrder) {
    const col = getColumnById(colId);
    if (!col) continue;
    const colEl = document.createElement("col");
    if (widths[colId]) colEl.style.width = widths[colId];
    colgroup.appendChild(colEl);
  }
  table.appendChild(colgroup);

  const thead = document.createElement("thead");
  const headerRow = document.createElement("tr");
  for (const colId of columnOrder) {
    const col = getColumnById(colId);
    if (!col) continue;
    const th = document.createElement("th");
    th.setAttribute("draggable", "true");
    th.dataset.colId = colId;

    const label = document.createElement("div");
    label.className = "col-label";
    const text = document.createElement("span");
    text.textContent = col.label;
    label.appendChild(text);
    th.appendChild(label);

    // Filter popover
    const filterWrap = document.createElement("div");
    filterWrap.className = "filter-wrap";
    const details = document.createElement("details");
    details.className = "filter";
    const summary = document.createElement("summary");
    summary.textContent = "Filter";
    details.appendChild(summary);

    const pop = document.createElement("div");
    pop.className = "filter-popover";
    const actions = document.createElement("div");
    actions.className = "filter-actions";
    const btnAll = document.createElement("button");
    btnAll.type = "button"; btnAll.textContent = "All";
    const btnNone = document.createElement("button");
    btnNone.type = "button"; btnNone.textContent = "None";
    const btnApply = document.createElement("button");
    btnApply.type = "button"; btnApply.textContent = "Apply";
    actions.append(btnAll, btnNone, btnApply);
    pop.appendChild(actions);

    const values = getColumnValues(colId);
    const selected = filters[colId];
    let draft = new Set(selected ? selected : values);
    const inputs = [];

    const syncChecks = () => inputs.forEach(({ input, value }) => { input.checked = draft.has(value); });
    btnAll.addEventListener("click", e => { e.preventDefault(); draft = new Set(values); syncChecks(); });
    btnNone.addEventListener("click", e => { e.preventDefault(); draft = new Set(); syncChecks(); });
    btnApply.addEventListener("click", e => {
      e.preventDefault();
      if (!draft.size || draft.size === values.length) delete filters[colId];
      else filters[colId] = new Set(draft);
      renderTable();
    });

    for (const value of values) {
      const lbl = document.createElement("label");
      lbl.className = "filter-option";
      const input = document.createElement("input");
      input.type = "checkbox";
      input.checked = selected ? selected.has(value) : true;
      input.addEventListener("change", () => { if (input.checked) draft.add(value); else draft.delete(value); });
      const txt = document.createElement("span");
      txt.textContent = value || "(empty)";
      lbl.append(input, txt);
      pop.appendChild(lbl);
      inputs.push({ input, value });
    }

    details.appendChild(pop);
    filterWrap.appendChild(details);
    th.appendChild(filterWrap);
    headerRow.appendChild(th);
  }
  thead.appendChild(headerRow);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  for (const row of filtered) {
    const tr = document.createElement("tr");
    for (const colId of columnOrder) {
      const col = getColumnById(colId);
      if (!col) continue;
      const td = document.createElement("td");
      if (colId === "vimeoUrl") {
        const url = col.get(row) || "";
        if (url) {
          const a = document.createElement("a");
          a.href = url; a.target = "_blank"; a.rel = "noreferrer";
          a.className = "vimeo-link"; a.textContent = url;
          td.appendChild(a);
        }
      } else {
        td.textContent = col.get(row) || "";
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);

  enableColumnDnD();
}

function enableColumnDnD() {
  document.querySelectorAll("#results-table th").forEach(th => {
    th.addEventListener("dragstart", e => { th.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", th.dataset.colId || ""); });
    th.addEventListener("dragend", () => th.classList.remove("dragging"));
    th.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; });
    th.addEventListener("drop", e => {
      e.preventDefault();
      const fromId = e.dataTransfer.getData("text/plain");
      const toId = th.dataset.colId;
      if (!fromId || !toId || fromId === toId) return;
      const fi = columnOrder.indexOf(fromId), ti = columnOrder.indexOf(toId);
      if (fi === -1 || ti === -1) return;
      columnOrder.splice(fi, 1);
      columnOrder.splice(ti, 0, fromId);
      saveColumnOrder();
      renderTable();
    });
  });
}

// ---------------------------------------------------------------------------
// Schema introspection + query builder
// ---------------------------------------------------------------------------

async function introspectType(endpoint, token, typeName) {
  const data = await gqlWithRetry(endpoint, token, QUERY_INTROSPECT_TYPE(typeName), {});
  return (data && data.__type && Array.isArray(data.__type.fields))
    ? data.__type.fields.map(f => f.name)
    : [];
}

function pick(fields, candidates) {
  for (const c of candidates) {
    if (fields.includes(c)) return c;
  }
  return null;
}

// Unwrap NON_NULL / LIST wrappers and return the named OBJECT/INTERFACE type.
function unwrapTypeName(typeObj) {
  let t = typeObj;
  for (let i = 0; i < 8; i++) {
    if (!t) return null;
    if (t.kind === "OBJECT" || t.kind === "INTERFACE" || t.kind === "UNION") return t.name;
    t = t.ofType;
  }
  return null;
}

// Return the unwrapped object/interface type name of a specific field on a parent type.
async function resolveFieldType(endpoint, token, parentTypeName, fieldName) {
  const safe = parentTypeName.replace(/[^a-zA-Z0-9_]/g, "_");
  const data = await gqlWithRetry(endpoint, token, `query FieldType_${safe} {
    __type(name: "${parentTypeName}") {
      fields {
        name
        type { name kind ofType { name kind ofType { name kind ofType { name kind } } } }
      }
    }
  }`, {});
  const fields = (data && data.__type && data.__type.fields) || [];
  const field = fields.find(f => f.name === fieldName);
  return field ? unwrapTypeName(field.type) : null;
}

// For a Connection type, return the type of items in its nodes[] field.
async function resolveConnectionNode(endpoint, token, connectionTypeName) {
  return resolveFieldType(endpoint, token, connectionTypeName, "nodes");
}

// Build the `content { ... }` fragment by introspecting ContentInterface.
// Collects htmlDescription (text/HTML) AND playUrl/url/sourceUrl (direct Vimeo URLs).
async function buildContentFragment(endpoint, token) {
  const HTML_FIELDS = ["htmlDescription", "body", "html", "htmlBody", "htmlContent", "rawBody", "renderedContent", "richText", "text", "description"];
  const URL_FIELDS  = ["playUrl", "url", "sourceUrl", "videoUrl", "embedUrl"];
  let data;
  try {
    data = await gqlWithRetry(endpoint, token, `query IntrospectContentIface {
      __type(name: "ContentInterface") {
        fields { name }
        possibleTypes {
          name
          fields { name }
        }
      }
    }`, {});
  } catch (e) {
    log("ContentInterface introspection failed: " + e.message);
    return "";
  }

  const type = data && data.__type;
  if (!type) { log("ContentInterface not found in schema."); return ""; }

  const ifaceFields = (type.fields || []).map(f => f.name);
  log("ContentInterface fields: " + ifaceFields.join(", "));

  // Check interface-level shared fields
  const sharedHtml = pick(ifaceFields, HTML_FIELDS);
  const sharedUrl  = pick(ifaceFields, URL_FIELDS);
  if (sharedHtml || sharedUrl) {
    const sel = [sharedHtml, sharedUrl].filter(Boolean).join(" ");
    return `content { ${sel} }`;
  }

  // Build per-implementation inline fragments (grab both HTML and URL fields per type)
  const frags = [];
  for (const pt of (type.possibleTypes || [])) {
    const ptFields = (pt.fields || []).map(f => f.name);
    log(pt.name + " fields: " + ptFields.join(", "));
    const htmlF = pick(ptFields, HTML_FIELDS);
    const urlF  = pick(ptFields, URL_FIELDS);
    if (htmlF || urlF) {
      const sel = [htmlF, urlF].filter(Boolean).join(" ");
      frags.push(`... on ${pt.name} { ${sel} }`);
    }
  }
  if (frags.length) return `content { ${frags.join(" ")} }`;

  log("No HTML/URL field found in ContentInterface — Vimeo detection will be limited.");
  return "";
}

// ---------------------------------------------------------------------------
// Introspection cache (localStorage, 24-hour TTL)
// ---------------------------------------------------------------------------

const SCHEMA_CACHE_KEY = "thinkific-vimeo-schema-v2";

function loadSchemaCache(endpoint) {
  try {
    const raw = localStorage.getItem(SCHEMA_CACHE_KEY);
    if (!raw) return null;
    const cached = JSON.parse(raw);
    if (cached.endpoint !== endpoint) return null;
    if (Date.now() - cached.ts > 24 * 60 * 60 * 1000) return null;
    return cached.data;
  } catch { return null; }
}

function saveSchemaCache(endpoint, data) {
  try { localStorage.setItem(SCHEMA_CACHE_KEY, JSON.stringify({ endpoint, ts: Date.now(), data })); } catch {}
}

// ---------------------------------------------------------------------------
// Chapter batch fetcher — sends N chapters in one query using aliases
// ---------------------------------------------------------------------------

const CHAPTER_BATCH_SIZE = 8; // 8 × ~100 lessons = ~800 cost, under the 1000 limit

async function fetchChapterBatch(endpoint, token, batch, chapterIdArg, lessonField, contentFrag) {
  // batch: array of { chapterId, chapterName, courseId, courseName }
  const vars = {};
  const sels = batch.map((ch, i) => {
    vars["id" + i] = ch.chapterId;
    return `ch${i}: chapter(${chapterIdArg}: $id${i}) {
      ${lessonField}(first: 100) {
        nodes { id title type: __typename ${contentFrag} }
        pageInfo { hasNextPage endCursor }
      }
    }`;
  });
  const varDefs = batch.map((_, i) => "$id" + i + ": ID!").join(", ");
  const query = `query BatchChapters(${varDefs}) {\n${sels.join("\n")}\n}`;
  return gqlWithRetry(endpoint, token, query, vars);
}

// ---------------------------------------------------------------------------
// Build both queries needed for the two-pass scan.
// Pass 1: site.courses → course+chapter IDs only (no lesson content, cheap)
// Pass 2: chapter(id:) batched → lessons+content (depth 6, cost ~100 each)
// ---------------------------------------------------------------------------
async function buildCourseQuery(endpoint, token) {
  const cached = loadSchemaCache(endpoint);
  if (cached) {
    log("Using cached schema (skip introspection). Clear cache to re-detect.");
    return cached;
  }

  log("Introspecting schema to discover field names…");

  // Content fragment — built once, used in the chapter-lessons query
  const contentFrag = await buildContentFragment(endpoint, token);
  log("Content fragment: " + (contentFrag || "(none)"));

  // Discover chapter field name on CourseCurriculum and its name selector
  const courseFields = await introspectType(endpoint, token, "Course");
  log("Course fields: " + courseFields.join(", "));

  const lvl1Field = pick(courseFields, ["curriculum", "chapters", "courseModules", "sections", "modules", "units"]);
  if (!lvl1Field) throw new Error("Cannot find curriculum field on Course. Fields: " + courseFields.join(", "));

  const lvl1TypeRaw = await resolveFieldType(endpoint, token, "Course", lvl1Field);
  const lvl1IsConn  = lvl1TypeRaw && lvl1TypeRaw.endsWith("Connection");
  const lvl1Type    = lvl1IsConn ? await resolveConnectionNode(endpoint, token, lvl1TypeRaw) : lvl1TypeRaw;

  let chapterContainerField = null; // field on lvl1Type that holds chapters
  let chapterNameSel = "name";

  if (lvl1Type) {
    const lvl1TypeFields = await introspectType(endpoint, token, lvl1Type);
    log(lvl1Type + " fields: " + lvl1TypeFields.join(", "));
    chapterContainerField = pick(lvl1TypeFields, ["chapters", "sections", "modules", "units", "items"]);

    if (chapterContainerField) {
      const chapRaw  = await resolveFieldType(endpoint, token, lvl1Type, chapterContainerField);
      const chapIsConn = chapRaw && chapRaw.endsWith("Connection");
      const chapType = chapIsConn ? await resolveConnectionNode(endpoint, token, chapRaw) : chapRaw;
      if (chapType) {
        const chapFields = await introspectType(endpoint, token, chapType);
        log(chapType + " fields: " + chapFields.join(", "));
        chapterNameSel = chapFields.includes("name") ? "name" : (chapFields.includes("title") ? "name: title" : "");
      }
    }
  }

  // Introspect root chapter query to find the ID arg name
  let chapterIdArg = "id";
  const rootData = await gqlWithRetry(endpoint, token, `query IntrospectRootQuery {
    __schema { queryType { fields { name args { name } } } }
  }`, {});
  const rootFields = (rootData?.__schema?.queryType?.fields) || [];
  log("Root query fields: " + rootFields.map(f => f.name).join(", "));
  const rootChapter = rootFields.find(f => f.name === "chapter");
  if (rootChapter && rootChapter.args && rootChapter.args.length > 0) {
    chapterIdArg = rootChapter.args[0].name;
  }
  log("chapter() id arg: " + chapterIdArg);

  // Introspect Chapter type to find lesson field and lesson name field
  const chapterTypeFromRoot = await resolveFieldType(endpoint, token, "Query", "chapter") ||
                              await resolveFieldType(endpoint, token, "Site",  "chapters");
  // Fall back: just introspect "Chapter" directly
  const chapterDirectFields = await introspectType(endpoint, token, "Chapter");
  log("Chapter fields: " + chapterDirectFields.join(", "));
  const lessonContainerOnChapter = pick(chapterDirectFields, ["lessons", "contents", "items", "courseContents"]);

  // ── Query 1: courses + chapter IDs (depth 7, cost = 10 × 100 = 1000) ──────
  const COURSES_FIRST  = 10;
  const CHAPTERS_FIRST = 100;

  let coursesQuery;
  if (!lvl1IsConn && chapterContainerField) {
    coursesQuery = `query SiteCourses($after: String) {
  site {
    courses(first: ${COURSES_FIRST}, after: $after) {
      nodes { id name
        ${lvl1Field} {
          ${chapterContainerField}(first: ${CHAPTERS_FIRST}) { nodes { id ${chapterNameSel} } }
        }
      }
      pageInfo { hasNextPage endCursor }
    }
  }
}`;
  } else if (lvl1IsConn) {
    coursesQuery = `query SiteCourses($after: String) {
  site {
    courses(first: ${COURSES_FIRST}, after: $after) {
      nodes { id name
        ${lvl1Field}(first: ${CHAPTERS_FIRST}) { nodes { id ${chapterNameSel} } }
      }
      pageInfo { hasNextPage endCursor }
    }
  }
}`;
  } else {
    coursesQuery = `query SiteCourses($after: String) {
  site {
    courses(first: 50, after: $after) {
      nodes { id name }
      pageInfo { hasNextPage endCursor }
    }
  }
}`;
  }

  // ── Query 2: lessons + content per chapter (depth 6, cost ~100) ────────────
  // chapter(id: $id) { lessons { nodes { id title content { ...fragments } } } }
  const lessonField = lessonContainerOnChapter || "lessons";
  const chapterLessonsQuery = `query ChapterLessons($id: ID!, $after: String) {
  chapter(${chapterIdArg}: $id) {
    ${lessonField}(first: 100, after: $after) {
      nodes {
        id title type: __typename
        ${contentFrag}
      }
      pageInfo { hasNextPage endCursor }
    }
  }
}`;

  const structure = {
    shape: lvl1IsConn ? "conn-chapters" : (chapterContainerField ? "obj-chapters" : "courses-only"),
    lvl1Field, chapterContainerField, chapterNameSel, lessonField,
    chapterIdArg, contentFrag  // needed by fetchChapterBatch
  };

  const result = { coursesQuery, chapterLessonsQuery, structure };
  saveSchemaCache(endpoint, result);
  log("Schema cached for 24 hours.");
  log("Courses query:\n" + coursesQuery);
  log("Chapter lessons query:\n" + chapterLessonsQuery);
  return result;
}

// Extract all Vimeo-scannable text from a lesson's content object.
// Concatenates all string values so both htmlDescription and playUrl are checked.
function getLessonHtml(lesson) {
  if (!lesson.content) return "";
  if (typeof lesson.content === "string") return lesson.content;
  // Interface result: object with keys from inline fragments (htmlDescription, playUrl, url, etc.)
  return Object.values(lesson.content)
    .filter(v => typeof v === "string" && v.length > 0)
    .join(" ");
}

// ---------------------------------------------------------------------------
// Main scan
// ---------------------------------------------------------------------------

async function runScan() {
  const endpoint = $("#endpoint").value.trim();
  const token = $("#token").value.trim();
  const courseIdFilter = $("#course-id").value.trim();
  const vimeoOnly = $("#vimeo-only").value === "yes";
  const outfile = $("#outfile").value.trim() || "thinkific-vimeo-lessons.csv";

  if (!endpoint || !token) { alert("Endpoint and token are required."); return; }

  $("#start").disabled = true;
  $("#download").disabled = true;
  $("#log").textContent = "";
  $("#reset-columns").disabled = true;
  setStatus("Introspecting schema…");
  $("#bar").classList.add("indeterminate");
  setBar(0);

  const detailRows = [];

  try {
    const { coursesQuery, chapterLessonsQuery, structure } = await buildCourseQuery(endpoint, token);
    setBar(10);

    const maxVimeo = parseInt($("#max-vimeo").value, 10) || 0;
    let totalLessons = 0;
    let totalVimeo = 0;
    let totalChapters = 0;
    const seenCourses = new Set();

    // Collect all chapters from all courses (pass 1)
    const allChapters = []; // { chapterId, chapterName, courseId, courseName }
    let coursePage = 0, courseAfter = null;
    while (true) {
      coursePage++;
      setStatus("Pass 1 — fetching courses page " + coursePage + "…");
      const data = await gqlWithRetry(endpoint, token, coursesQuery, { after: courseAfter });
      const courseConn = data && data.site && data.site.courses;
      if (!courseConn) throw new Error("Unexpected response — courses missing.");

      for (const course of (courseConn.nodes || [])) {
        if (courseIdFilter && String(course.id) !== courseIdFilter) continue;
        seenCourses.add(course.id);

        // Extract chapter nodes based on query shape
        let chapterNodes = [];
        if (structure.shape === "obj-chapters" && course[structure.lvl1Field]) {
          const container = course[structure.lvl1Field][structure.chapterContainerField];
          chapterNodes = (container && container.nodes) || [];
        } else if (structure.shape === "conn-chapters" && course[structure.lvl1Field]) {
          chapterNodes = (course[structure.lvl1Field].nodes) || [];
        }

        for (const ch of chapterNodes) {
          allChapters.push({ chapterId: ch.id, chapterName: ch.name || "", courseId: course.id, courseName: course.name || "" });
        }
      }

      setBar(Math.min(25, 10 + coursePage * 5));
      if (courseConn.pageInfo && courseConn.pageInfo.hasNextPage) courseAfter = courseConn.pageInfo.endCursor;
      else break;
    }

    log("Pass 1 complete: " + seenCourses.size + " courses, " + allChapters.length + " chapters.");
    totalChapters = allChapters.length;

    // Pass 2: fetch lessons+content in batches of CHAPTER_BATCH_SIZE chapters per query
    const { chapterIdArg, contentFrag, lessonField } = structure;
    let done = false;

    for (let ci = 0; ci < allChapters.length && !done; ci += CHAPTER_BATCH_SIZE) {
      const batch = allChapters.slice(ci, ci + CHAPTER_BATCH_SIZE);
      setStatus("Pass 2 — chapters " + (ci + 1) + "–" + Math.min(ci + CHAPTER_BATCH_SIZE, totalChapters) + " / " + totalChapters + "…");
      setBar(25 + Math.round(65 * ci / Math.max(1, totalChapters)));

      const data = await fetchChapterBatch(endpoint, token, batch, chapterIdArg, lessonField, contentFrag);

      for (let bi = 0; bi < batch.length && !done; bi++) {
        const { chapterId, chapterName, courseId, courseName } = batch[bi];
        const chNode = data && data["ch" + bi];
        if (!chNode) { log("No data for chapter " + chapterId); continue; }

        const lessonConn = chNode[lessonField];
        if (!lessonConn) { log("No lessons on chapter " + chapterId); continue; }

        if (lessonConn.pageInfo && lessonConn.pageInfo.hasNextPage) {
          log("Note: chapter " + chapterId + " has >100 lessons — only first 100 scanned in this batch pass.");
        }

        for (const lesson of (lessonConn.nodes || [])) {
          totalLessons++;
          const html = getLessonHtml(lesson);
          const vimeoLinks = extractVimeoLinks(html);

          if (vimeoLinks.length > 0) {
            totalVimeo++;
            for (const url of vimeoLinks) {
              detailRows.push({
                courseId, courseName, chapterId, chapterName,
                lessonId: lesson.id || "", lessonTitle: lesson.title || "",
                lessonType: lesson.type || "", vimeoUrl: url
              });
            }
          } else if (!vimeoOnly) {
            detailRows.push({
              courseId, courseName, chapterId, chapterName,
              lessonId: lesson.id || "", lessonTitle: lesson.title || "",
              lessonType: lesson.type || "", vimeoUrl: ""
            });
          }
        }

        if (maxVimeo > 0 && totalVimeo >= maxVimeo) {
          log("Reached limit of " + maxVimeo + " Vimeo hits — stopping early.");
          done = true;
        }
      }
    }

    tableRows = detailRows;
    renderTable();
    $("#reset-columns").disabled = false;

    if (!detailRows.length) {
      setStatus("Scan complete — no Vimeo links found.");
      log("Scan complete. " + totalLessons + " lessons checked, 0 Vimeo links found.");
      return;
    }

    setStatus("Ready ✔  — " + totalVimeo + " lessons with Vimeo links (" + detailRows.length + " total rows)");
    setBar(100);
    log("Scan complete. " + totalLessons + " lessons across " + totalChapters + " chapters in " + seenCourses.size + " courses. " + totalVimeo + " with Vimeo links.");

    const dlBtn = $("#download");
    dlBtn.disabled = false;
    dlBtn.onclick = () => {
      const csv = toCSV(detailRows, columnOrder);
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = outfile;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    };

  } catch (err) {
    console.error(err);
    setStatus("Error ⚠  " + err.message);
    log("Error: " + err.message);
    if (err && err.body) log("Details: " + JSON.stringify(err.body));
  } finally {
    $("#start").disabled = false;
  }
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------

const TOKEN_KEY = "thinkific-vimeo-finder-token";
const savedToken = localStorage.getItem(TOKEN_KEY);
if (savedToken) { $("#token").value = savedToken; log("Loaded saved API key from this device."); }

loadColumnOrder();

$("#save-token").addEventListener("click", () => {
  const t = $("#token").value.trim();
  if (!t) { alert("Enter a token before saving."); return; }
  localStorage.setItem(TOKEN_KEY, t);
  log("API key saved to this device.");
});

$("#start").addEventListener("click", runScan);
$("#reset-columns").addEventListener("click", resetColumns);

const resizeBox = $("#table-resize");
const resizeHandle = $("#table-resize-handle");
if (resizeBox && resizeHandle) {
  resizeHandle.addEventListener("mousedown", e => {
    e.preventDefault();
    const sx = e.clientX, sy = e.clientY;
    const sw = resizeBox.getBoundingClientRect().width;
    const sh = resizeBox.getBoundingClientRect().height;
    const onMove = ev => {
      resizeBox.style.width = Math.max(600, sw + (ev.clientX - sx)) + "px";
      resizeBox.style.height = Math.max(240, sh + (ev.clientY - sy)) + "px";
    };
    const onUp = () => { document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });
}
</script>
