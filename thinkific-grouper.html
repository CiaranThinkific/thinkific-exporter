<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Thinkific Grouper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --bg:#0f172a; --card:#0b1220; --ink:#e5e7eb; --muted:#a1a1aa; --accent:#6366f1; --accent2:#22d3ee; --border:#232a3b }
    body { margin:0; padding:24px; background:var(--bg); color:var(--ink); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    .wrap { max-width:900px; margin:0 auto }
    .card { background:linear-gradient(180deg, #0b1220, #0a0f1a); border:1px solid var(--border); border-radius:18px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,.35) }
    h1 { margin:.2em 0 .5em; font-size:1.6rem }
    .muted { color:var(--muted); font-size:.92rem }
    label { display:block; margin-top:12px; font-size:.95rem; color:#cbd5e1 }
    .token-save { display:flex; gap:8px; align-items:center; margin-top:6px }
    .token-save input { flex:1 }
    .token-save button { flex:0 0 auto; padding:10px 14px; font-size:.95rem }
    input, textarea, select { width:100%; padding:10px 12px; border-radius:12px; border:1px solid #263249; background:#0a1220; color:var(--ink) }
    .row { display:flex; gap:12px; align-items:flex-end }
    .row > * { flex:1 }
    .btns { display:flex; gap:12px; margin-top:16px }
    button { flex:1; padding:12px 16px; border-radius:12px; border:0; background:var(--accent); color:white; font-weight:600; font-size:1rem; cursor:pointer }
    button.secondary { background:#1f2937 }
    button.danger { background:#ef4444; color:#fff }
    button:disabled { opacity:.6; cursor:not-allowed }
    .progress { position:relative; margin-top:14px; height:12px; background:#0a1220; border:1px solid #263249; border-radius:999px; overflow:hidden }
    .bar { position:absolute; inset:0; width:0%; background:linear-gradient(90deg, var(--accent), var(--accent2)); transition:width .2s linear }
    .bar.indeterminate::before { content:""; position:absolute; left:-40%; top:0; width:40%; height:100%; background:linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent); animation: slide 1.1s infinite }
    @keyframes slide { 0% { left:-40% } 100% { left:100% } }
    .status { margin-top:8px; font-size:.9rem; color:#cbd5e1 }
    .log { margin-top:12px; background:#0a1220; border:1px solid #263249; border-radius:12px; padding:10px; font-size:.85rem; max-height:280px; overflow:auto; white-space:pre-wrap }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; border:1px solid #263249; font-size:.75rem; color:#cbd5e1 }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Thinkific Grouper</h1>
      <div class="muted">Loads all users and groups, then stress-tests <b>bulkAddUsersToGroups</b> and <b>bulkRemoveUsersFromGroups</b> until the run time expires. Respects rate limits.</div>

      <div class="row">
        <label>GraphQL Endpoint
          <input id="endpoint" value="https://api.thinkific.com/beta/graphql">
        </label>
        <label>Batch Size (users + groups per mutation)
          <input id="batch-size" type="number" min="1" max="100" value="5">
        </label>
      </div>

      <div class="row">
        <label>Run Time (seconds)
          <input id="run-time" type="number" min="1" max="3600" value="60">
        </label>
        <label style="flex:0"></label>
      </div>

      <label>Bearer Token (saved on this device)
        <div class="token-save">
          <input id="token" value="add access token here!">
          <button id="save-token" type="button" class="secondary">Save API Key</button>
        </div>
      </label>

      <div class="btns">
        <button id="start">Start</button>
        <button id="stop" class="danger" disabled>Stop</button>
      </div>

      <div class="progress"><div id="bar" class="bar indeterminate"></div></div>
      <div id="status" class="status">Idle</div>
      <div id="log" class="log"></div>

      <p class="muted">
        <span class="pill">CORS</span> Runs in the browser. If you see CORS errors, use a CLI variant.
      </p>
    </div>
  </div>

<script>
const $ = s => document.querySelector(s);
const log = (m) => ( $("#log").textContent += ($("#log").textContent ? "\n" : "") + m, $("#log").scrollTop = $("#log").scrollHeight );
const setStatus = (t) => $("#status").textContent = t;
const setBar = (pct) => { const b = $("#bar"); b.classList.remove("indeterminate"); b.style.width = Math.max(0, Math.min(100, pct)) + "%"; };
const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

const QUERY_USERS = `query UsersPage($after: String) {
  site {
    users(first: 100, after: $after) {
      nodes { id email }
      pageInfo { hasNextPage endCursor }
    }
  }
}`;

const QUERY_GROUPS = `query GroupsPage($after: String) {
  site {
    groups(first: 100, after: $after) {
      nodes { id name }
      pageInfo { hasNextPage endCursor }
    }
  }
}`;

const MUTATION_ADD = `mutation BulkAddUsersToGroups($input: BulkAddUsersToGroupsInput!) {
  bulkAddUsersToGroups(input: $input) {
    clientMutationId
    userErrors { code message path }
  }
}`;

const MUTATION_REMOVE = `mutation BulkRemoveUsersFromGroups($input: BulkRemoveUsersFromGroupsInput!) {
  bulkRemoveUsersFromGroups(input: $input) {
    clientMutationId
    message
    userErrors { code message path }
  }
}`;

function attachRateLimit(err, payload) {
  if (payload && payload.extensions && payload.extensions.rateLimit) {
    err.rateLimit = payload.extensions.rateLimit;
  }
}

async function gql(endpoint, token, query, variables) {
  const resp = await fetch(endpoint, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify({ query, variables })
  });

  let json;
  try {
    json = await resp.json();
  } catch (parseErr) {
    if (!resp.ok) {
      const err = new Error("HTTP " + resp.status + " - " + resp.statusText);
      err.status = resp.status;
      throw err;
    }
    throw new Error("Invalid JSON response.");
  }

  if (!resp.ok) {
    const err = new Error("HTTP " + resp.status + " - " + resp.statusText);
    err.status = resp.status;
    err.body = json;
    attachRateLimit(err, json);
    throw err;
  }

  if (json.errors) {
    const msg = json.errors.map(e => e.message).join("; ");
    const err = new Error("GraphQL error: " + msg);
    err.graphQLErrors = json.errors;
    const code = json.errors.find(e => e.extensions && e.extensions.code)?.extensions.code;
    if (code) err.code = code;
    attachRateLimit(err, json);
    throw err;
  }

  return json.data;
}

function isRateLimitError(err) {
  if (!err) return false;
  if (err.code === "RATE_LIMITED") return true;
  if (err.status === 429) return true;
  if (Array.isArray(err.graphQLErrors)) {
    return err.graphQLErrors.some(e => e.extensions && e.extensions.code === "RATE_LIMITED");
  }
  const msg = typeof err.message === "string" ? err.message.toLowerCase() : "";
  return msg.includes("rate limit") || msg.includes("429") || msg.includes("too many requests");
}

function getRateLimitWait(err) {
  const fallbackMs = 60 * 1000;
  const rl = err && err.rateLimit;
  if (rl && rl.resetAt) {
    const resetAtMs = new Date(rl.resetAt).getTime();
    if (Number.isFinite(resetAtMs)) {
      const diff = resetAtMs - Date.now();
      if (diff > 0) {
        return {
          waitMs: Math.min(diff, 5 * 60 * 1000),
          resetAt: rl.resetAt
        };
      }
    }
  }
  return { waitMs: fallbackMs, resetAt: rl && rl.resetAt };
}

async function gqlWithRetry(endpoint, token, query, variables, logFn) {
  for (;;) {
    try {
      return await gql(endpoint, token, query, variables);
    } catch (err) {
      if (isRateLimitError(err)) {
        const { waitMs, resetAt } = getRateLimitWait(err);
        const safeWaitMs = Math.max(1000, waitMs || 0);
        const waitSeconds = Math.ceil(safeWaitMs / 1000);
        const resetNote = resetAt ? " (reset at " + resetAt + ")" : "";
        setStatus("Rate limited. Waiting " + waitSeconds + "s" + resetNote + "…");
        if (logFn) logFn("Rate limited. Waiting " + waitSeconds + "s" + resetNote + "…");
        await sleep(safeWaitMs);
        continue;
      }
      throw err;
    }
  }
}

async function fetchAllUsers(endpoint, token) {
  const ids = [];
  let after = null;
  let page = 0;
  while (true) {
    page++;
    setStatus("Fetching users page " + page + "…");
    const data = await gqlWithRetry(endpoint, token, QUERY_USERS, { after }, log);
    const users = data?.site?.users;
    if (!users) throw new Error("Unexpected users response shape.");
    const nodes = users.nodes || [];
    for (const u of nodes) {
      if (u.id) ids.push(u.id);
    }
    log("Users page " + page + ": " + nodes.length + " (total: " + ids.length + ")");
    if (users.pageInfo && users.pageInfo.hasNextPage) {
      after = users.pageInfo.endCursor;
    } else {
      break;
    }
  }
  return ids;
}

async function fetchAllGroups(endpoint, token) {
  const ids = [];
  let after = null;
  let page = 0;
  try {
    while (true) {
      page++;
      setStatus("Fetching groups page " + page + "…");
      const data = await gqlWithRetry(endpoint, token, QUERY_GROUPS, { after }, log);
      const groups = data?.site?.groups;
      if (!groups) throw new Error("Unexpected groups response shape.");
      const nodes = groups.nodes || [];
      for (const g of nodes) {
        if (g.id) ids.push(g.id);
      }
      log("Groups page " + page + ": " + nodes.length + " (total: " + ids.length + ")");
      if (groups.pageInfo && groups.pageInfo.hasNextPage) {
        after = groups.pageInfo.endCursor;
      } else {
        break;
      }
    }
  } catch (err) {
    if (ids.length === 0) {
      log("Groups pagination may not be supported, trying single page…");
      setStatus("Fetching groups (single page)…");
      const data = await gqlWithRetry(endpoint, token, `query { site { groups(first: 100) { nodes { id name } } } }`, {}, log);
      const groups = data?.site?.groups;
      if (groups && groups.nodes) {
        for (const g of groups.nodes) {
          if (g.id) ids.push(g.id);
        }
        log("Groups (single page): " + ids.length);
      }
    }
    return ids;
  }
  return ids;
}

function pickBatch(arr, size, offset) {
  if (!arr.length) return [];
  const result = [];
  for (let i = 0; i < size; i++) {
    result.push(arr[(offset + i) % arr.length]);
  }
  return result;
}

let stopRequested = false;

async function run() {
  const endpoint = $("#endpoint").value.trim();
  const token = $("#token").value.trim();
  const batchSize = Math.max(1, Math.min(100, parseInt($("#batch-size").value, 10) || 5));
  const runTimeSeconds = Math.max(1, Math.min(3600, parseInt($("#run-time").value, 10) || 60));

  if (!endpoint || !token) {
    alert("Endpoint and token are required.");
    return;
  }

  $("#start").disabled = true;
  $("#stop").disabled = false;
  $("#log").textContent = "";
  stopRequested = false;
  setStatus("Loading users…");
  $("#bar").classList.add("indeterminate");
  setBar(0);

  let userIds = [];
  let groupIds = [];

  try {
    userIds = await fetchAllUsers(endpoint, token);
    if (!userIds.length) {
      setStatus("Error: No users found.");
      log("No users found on site.");
      return;
    }
    log("Loaded " + userIds.length + " users.");

    setStatus("Loading groups…");
    groupIds = await fetchAllGroups(endpoint, token);
    if (!groupIds.length) {
      setStatus("Error: No groups found.");
      log("No groups found on site.");
      return;
    }
    log("Loaded " + groupIds.length + " groups.");

    const startTime = Date.now();
    const endTime = startTime + runTimeSeconds * 1000;
    let addCount = 0;
    let removeCount = 0;
    let cycle = 0;
    let userOffset = 0;
    let groupOffset = 0;

    setStatus("Running add/remove cycles…");
    setBar(0);

    while (Date.now() < endTime && !stopRequested) {
      cycle++;
      const elapsed = (Date.now() - startTime) / 1000;
      const pct = Math.min(100, (elapsed / runTimeSeconds) * 100);
      setBar(pct);
      setStatus("Cycle " + cycle + " | " + Math.round(elapsed) + "s / " + runTimeSeconds + "s | Adds: " + addCount + " Removes: " + removeCount);

      const batchUserIds = pickBatch(userIds, batchSize, userOffset);
      const batchGroupIds = pickBatch(groupIds, batchSize, groupOffset);
      userOffset += batchSize;
      groupOffset += batchSize;

      if (!batchUserIds.length || !batchGroupIds.length) {
        log("Skipping cycle " + cycle + ": no users or groups in batch.");
        continue;
      }

      const input = { groupIds: batchGroupIds, userIds: batchUserIds };

      try {
        const addData = await gqlWithRetry(endpoint, token, MUTATION_ADD, { input }, log);
        const addResult = addData?.bulkAddUsersToGroups;
        addCount++;
        const addErrors = addResult?.userErrors || [];
        if (addErrors.length) {
          log("Add cycle " + cycle + " userErrors: " + JSON.stringify(addErrors));
        } else {
          log("Add cycle " + cycle + " OK");
        }
      } catch (err) {
        log("Add cycle " + cycle + " error: " + err.message);
      }

      if (stopRequested || Date.now() >= endTime) break;

      try {
        const removeData = await gqlWithRetry(endpoint, token, MUTATION_REMOVE, { input }, log);
        const removeResult = removeData?.bulkRemoveUsersFromGroups;
        removeCount++;
        const removeErrors = removeResult?.userErrors || [];
        const msg = removeResult?.message;
        if (removeErrors.length) {
          log("Remove cycle " + cycle + " userErrors: " + JSON.stringify(removeErrors));
        } else if (msg) {
          log("Remove cycle " + cycle + ": " + msg);
        } else {
          log("Remove cycle " + cycle + " OK");
        }
      } catch (err) {
        log("Remove cycle " + cycle + " error: " + err.message);
      }
    }

    setBar(100);
    const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
    setStatus("Complete in " + totalTime + "s | Adds: " + addCount + " Removes: " + removeCount);
    log("Done. " + addCount + " adds, " + removeCount + " removes in " + totalTime + "s.");
  } catch (err) {
    console.error(err);
    setStatus("Error: " + err.message);
    log("Error: " + err.message);
  } finally {
    $("#start").disabled = false;
    $("#stop").disabled = true;
  }
}

const TOKEN_KEY = "thinkific-grouper-token";
const saved = localStorage.getItem(TOKEN_KEY);
if (saved) {
  $("#token").value = saved;
  log("Loaded saved API key from this device.");
}
$("#save-token").addEventListener("click", () => {
  const token = $("#token").value.trim();
  if (!token) { alert("Enter a token before saving."); return; }
  localStorage.setItem(TOKEN_KEY, token);
  log("API key saved to this device.");
});

$("#start").addEventListener("click", run);
$("#stop").addEventListener("click", () => {
  stopRequested = true;
  setStatus("Stopping after current request…");
  log("Stop requested.");
});
</script>
</body>
</html>
